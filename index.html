<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請求書_2026</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'M PLUS Rounded 1c', sans-serif; background: #f3faf6; }
        :root {
            --accent: #8fc7a8;
            --accent-light: #cfe9da;
            --accent-dark: #5a9c79;
            --bg-warm: #f3faf6;
            --bg-card: #fbfdfc;
            --border: #cfe9da;
        }
        @media screen and (max-width: 640px) {
            #invoice-box.invoice-screen {
                padding: 20px 16px !important;
            }
            #invoice-box.invoice-screen .inv-title { font-size: 26px !important; }
            #invoice-box.invoice-screen .inv-to-name { font-size: 15px !important; white-space: nowrap !important; }
            #invoice-box.invoice-screen .inv-from-name { font-size: 13px !important; }
            #invoice-box.invoice-screen .inv-from-detail { font-size: 11px !important; }
            #invoice-box.invoice-screen .inv-label { font-size: 10px !important; }
            #invoice-box.invoice-screen .inv-req-label { font-size: 12px !important; }
            #invoice-box.invoice-screen .inv-req-amt { font-size: 20px !important; }
            #invoice-box.invoice-screen .inv-row { gap: 12px !important; }
            #invoice-box.invoice-screen table { font-size: 10.5px !important; width: 100% !important; }
            #invoice-box.invoice-screen th { font-size: 9px !important; padding: 6px 2px !important; }
            #invoice-box.invoice-screen td { font-size: 10.5px !important; padding: 10px 2px !important; }
            #invoice-box.invoice-screen th:first-child, #invoice-box.invoice-screen td:first-child { white-space: nowrap !important; }
            #invoice-box.invoice-screen .inv-to-note { font-size: 10.5px !important; white-space: nowrap !important; }
            #invoice-box.invoice-screen .inv-summary-row { font-size: 10.5px !important; }
            #invoice-box.invoice-screen .inv-summary-total { font-size: 11px !important; }
            #invoice-box.invoice-screen .inv-bank-note { font-size: 10.5px !important; }
            #invoice-box.invoice-screen .inv-bank-grid { font-size: 11px !important; grid-template-columns: 64px 1fr !important; }
            #invoice-box.invoice-screen .inv-footer { font-size: 10px !important; }
        }
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            @page { size: A4; margin: 10mm; }
            #invoice-box {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                margin: 0 !important;
                min-height: unset !important;
                font-size: 10px;
                page-break-after: avoid;
                page-break-inside: avoid;
            }
            #invoice-box * {
                page-break-inside: avoid;
            }
        }
        .animate-success { animation: success-pulse 0.5s ease-out; }
        @keyframes success-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .nav-btn-active { background: linear-gradient(135deg, #5a9c79, #8fc7a8); color: white; }
        .save-btn { background: linear-gradient(135deg, #5a9c79, #7fc8a3); }
        .save-btn:hover { background: linear-gradient(135deg, #5a9c79, #8fc7a8); }
        .header-bg { background: linear-gradient(135deg, #a8d6bc, #bfe3cd); }
        .total-bar { background: linear-gradient(135deg, #5a9c79, #8fc7a8); }
        .tag-tour { background: #f3faf6; color: #3d6e54; }
        .tag-work { background: #dcefe2; color: #5a9c79; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const HOURLY_RATE = 1200;
        const TOUR_RATES = { 'レイビレツアー・瞑想': 1000, '素戔嗚散歩': 2000 };
        const BANK_TYPES = ['普通', '当座'];
        const HOURS = Array.from({ length: 18 }, (_, i) => String(i + 6).padStart(2, '0'));
        const MINUTES = ['00', '05', '10', '15', '20', '25', '30', '35', '40', '45', '50', '55'];

        const App = () => {
            const [records, setRecords] = useState(() => {
                const saved = localStorage.getItem('attendance_records_v4');
                return saved ? JSON.parse(saved) : [];
            });
            const [currentView, setCurrentView] = useState('input');
            const [isSuccess, setIsSuccess] = useState(false);

            const [profile, setProfile] = useState(() => {
                const saved = localStorage.getItem('staff_profile_v1');
                const defaults = {
                    name: '', zip: '', address: '', tel: '', invoiceNo: '',
                    bankName: '', bankCode: '', branchName: '', branchCode: '',
                    bankType: '普通', bankNumber: '', bankHolder: '',
                    isCafeOnly: false
                };
                return saved ? {...defaults, ...JSON.parse(saved)} : defaults;
            });
            const [profileSaved, setProfileSaved] = useState(false);
            const [zipStatus, setZipStatus] = useState('');
            const [sendStatus, setSendStatus] = useState('');
            const [sentMonths, setSentMonths] = useState(() => {
                const saved = localStorage.getItem('sent_months_v1');
                return saved ? JSON.parse(saved) : [];
            });

            useEffect(() => {
                localStorage.setItem('sent_months_v1', JSON.stringify(sentMonths));
            }, [sentMonths]);
            const [confirmDialog, setConfirmDialog] = useState(null); // {message, onOk}
            const [approvedIds, setApprovedIds] = useState(() => {
                const saved = localStorage.getItem('approved_ids_v1');
                return saved ? JSON.parse(saved) : [];
            });
            useEffect(() => {
                localStorage.setItem('approved_ids_v1', JSON.stringify(approvedIds));
            }, [approvedIds]);
            const [pwDialog, setPwDialog] = useState(null); // {message, onOk}
            const [pwInput, setPwInput] = useState('');
            const [pwError, setPwError] = useState(false);

            // その月のパスワード（例：6月なら ok6）。日付(YYYY-MM-DD)から月番号を取り出す
            const getMonthPassword = (dateStr) => {
                const m = parseInt((dateStr || '').split('-')[1] || (new Date().getMonth() + 1), 10);
                return 'ok' + m;
            };

            const askPassword = (dateStr, message, onOk) => {
                setPwInput('');
                setPwError(false);
                setPwDialog({ message, onOk, correctPw: getMonthPassword(dateStr) });
            };
            const GAS_URL = localStorage.getItem('gas_url') || '';
            const [shiftInfo, setShiftInfo] = useState([]); // [{kubun, start, end}, ...]
            const [shiftLoading, setShiftLoading] = useState(false);

            const showConfirm = (message, onOk, isDanger = false, okLabel = '送信する') => {
                setConfirmDialog({ message, onOk, isDanger, okLabel });
            };

            // マスト項目チェック
            const getMissingFields = () => {
                const missing = [];
                if (!profile.name) missing.push('氏名・屋号');
                if (!profile.zip) missing.push('郵便番号');
                if (!profile.address) missing.push('住所');
                if (!profile.tel) missing.push('電話番号');
                if (!profile.bankType) missing.push('口座種別');
                if (!profile.bankNumber) missing.push('口座番号');
                if (!profile.bankHolder) missing.push('口座名義');
                return missing;
            };

            const handleSendInvoice = async () => {
                if (!GAS_URL) {
                    alert('GAS URLが設定されていません。請求書画面の設定から入力してください。');
                    return;
                }
                const missing = getMissingFields();
                if (missing.length > 0) {
                    alert(`以下の項目をプロフィールに登録してください：\n・${missing.join('\n・')}`);
                    return;
                }
                if (invoiceData.filtered.length === 0) {
                    alert('送信するデータがありません。');
                    return;
                }
                if (hasUnapprovedRecord) {
                    alert('未承認のツアー記録があります。\n履歴タブで、まっちゃんの承認を受けてから送信してください。');
                    return;
                }

                showConfirm(
                    `${selectedMonth.replace('-', '年')}月分　¥${invoiceData.totalAmount.toLocaleString()}\n\n送信後の修正及び後日報告は原則不可です。\nよろしいですか？`,
                    async () => {
                        setSendStatus('sending');

                        const byType = { フロント: {hours:0, amount:0}, カフェ: {hours:0, amount:0}, ツアー: {guests:0, amount:0}, 物販: {hours:0, amount:0}, 手入力: {amount:0} };
                        const frontDates = [];
                        invoiceData.filtered.forEach(r => {
                            if (r.type === 'ツアー') {
                                byType.ツアー.guests += r.guests || 0;
                                byType.ツアー.amount += r.amount;
                            } else if (r.type === '手入力') {
                                byType.手入力.amount += r.amount;
                            } else if (byType[r.type]) {
                                byType[r.type].hours += parseFloat(r.hours || 0);
                                byType[r.type].amount += r.amount;
                                if (r.type === 'フロント') frontDates.push(r.date);
                            }
                        });

                        const payload = {
                            name: profile.name,
                            month: selectedMonth.replace('-', '年') + '月',
                            frontHours:  Math.round(byType.フロント.hours * 100) / 100,
                            frontAmount: byType.フロント.amount,
                            frontDates:  frontDates,
                            cafeHours:   Math.round(byType.カフェ.hours * 100) / 100,
                            cafeAmount:  byType.カフェ.amount,
                            tourGuests:  byType.ツアー.guests,
                            tourAmount:  byType.ツアー.amount,
                            salesHours:  Math.round(byType.物販.hours * 100) / 100,
                            salesAmount: byType.物販.amount,
                            totalHours:  Math.round(invoiceData.totalHours * 100) / 100,
                            totalAmount: invoiceData.totalAmount,
                            zip:         profile.zip,
                            address:     profile.address,
                            tel:         profile.tel,
                            bankName:    profile.bankName,
                            branchName:  profile.branchName,
                            bankType:    profile.bankType,
                            bankNumber:  profile.bankNumber,
                            bankHolder:  profile.bankHolder,
                            isCafeOnly:  !!profile.isCafeOnly
                        };

                        try {
                            await fetch(GAS_URL, {
                                method: 'POST',
                                mode: 'no-cors',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            setSendStatus('ok');
                            setSentMonths(prev => prev.includes(selectedMonth) ? prev : [...prev, selectedMonth]);
                            setTimeout(() => setSendStatus(''), 4000);
                        } catch (err) {
                            setSendStatus('error');
                            setTimeout(() => setSendStatus(''), 4000);
                        }
                    }
                );
            };

            // 勤務形態ごとの時間を独立管理
            const [timeByType, setTimeByType] = useState(() => {
                const saved = localStorage.getItem('time_by_type_v1');
                return saved ? JSON.parse(saved) : {
                    フロント: { startH: '09', startM: '00', endH: '17', endM: '00', breakTime: '0' },
                    カフェ:   { startH: '09', startM: '00', endH: '17', endM: '00', breakTime: '0' },
                    物販:     { startH: '09', startM: '00', endH: '17', endM: '00', breakTime: '0' },
                };
            });

            const [formData, setFormData] = useState({
                date: new Date().toISOString().split('T')[0],
                name: '',
                type: 'フロント',
                startH: '09', startM: '00',
                endH: '17', endM: '00',
                breakTime: '0',
                tourGuests: '1',
                tourType: 'レイビレツアー・瞑想',
                manualAmount: '0'
            });

            const [selectedMonth, setSelectedMonth] = useState(() => {
                const now = new Date();
                return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            });
            const [historyShowAll, setHistoryShowAll] = useState(false); // 履歴タブの「全件」表示フラグ（このタブ専用）

            useEffect(() => {
                localStorage.setItem('staff_profile_v1', JSON.stringify(profile));
            }, [profile]);

            useEffect(() => {
                localStorage.setItem('attendance_records_v4', JSON.stringify(records));
            }, [records]);

            useEffect(() => {
                localStorage.setItem('time_by_type_v1', JSON.stringify(timeByType));
            }, [timeByType]);

            // プロフィールの名前が変わったらformDataにも反映
            useEffect(() => {
                if (profile.name) {
                    setFormData(f => ({...f, name: profile.name}));
                }
            }, [profile.name]);

            // カフェ専従モードがONなら、勤務形態を自動でカフェに固定
            useEffect(() => {
                if (profile.isCafeOnly) {
                    setFormData(f => f.type === 'カフェ' ? f : ({...f, type: 'カフェ', ...timeByType['カフェ']}));
                }
            }, [profile.isCafeOnly]);

            // 勤務形態がフロントのとき、日付・名前からシフトを自動検索
            useEffect(() => {
                const personName = (formData.name || profile.name || '').trim();
                if (formData.type !== 'フロント' || !personName || !formData.date || !GAS_URL) {
                    setShiftInfo([]);
                    return;
                }
                setShiftLoading(true);
                fetch(`${GAS_URL}?action=getShift&name=${encodeURIComponent(personName)}&date=${formData.date}`)
                    .then(res => res.json())
                    .then(data => {
                        setShiftInfo(data.status === 'ok' ? data.shifts : []);
                    })
                    .catch(() => setShiftInfo([]))
                    .finally(() => setShiftLoading(false));
            }, [formData.type, formData.date, formData.name, profile.name, GAS_URL]);

            const handleSaveProfile = () => {
                setProfileSaved(true);
                setTimeout(() => setProfileSaved(false), 2000);
            };

            const currentCalculation = useMemo(() => {
                if (formData.type === 'ツアー') {
                    const count = parseInt(formData.tourGuests || 0);
                    const rate = TOUR_RATES[formData.tourType || 'レイビレツアー・瞑想'];
                    return { hours: null, guests: count, amount: count * rate };
                } else if (formData.type === '手入力') {
                    return { hours: null, guests: null, amount: parseInt(formData.manualAmount || 0) };
                } else {
                    const start = new Date(`2000/01/01 ${formData.startH}:${formData.startM}`);
                    const end = new Date(`2000/01/01 ${formData.endH}:${formData.endM}`);
                    let diffMs = end - start;
                    if (diffMs < 0) return { hours: "0.00", amount: 0 };
                    let diffMin = (diffMs / (1000 * 60)) - parseInt(formData.breakTime || 0);
                    if (diffMin < 0) diffMin = 0;
                    const roundedMin = Math.floor(diffMin / 5) * 5;
                    const hoursVal = roundedMin / 60;
                    return { hours: hoursVal.toFixed(2), guests: null, amount: Math.floor(hoursVal * HOURLY_RATE) };
                }
            }, [formData]);

            const handleAddRecord = () => {
                const calc = currentCalculation;
                const newRecord = {
                    id: Date.now(),
                    date: formData.date,
                    registeredAt: new Date().toLocaleString('ja-JP'),
                    name: formData.name || profile.name,
                    type: formData.type,
                    startTime: (formData.type === 'ツアー' || formData.type === '手入力') ? '-' : `${formData.startH}:${formData.startM}`,
                    endTime: (formData.type === 'ツアー' || formData.type === '手入力') ? '-' : `${formData.endH}:${formData.endM}`,
                    breakTime: (formData.type === 'ツアー' || formData.type === '手入力') ? '0' : formData.breakTime,
                    hours: calc.hours,
                    guests: calc.guests,
                    tourType: formData.type === 'ツアー' ? (formData.tourType || 'レイビレツアー・瞑想') : '',
                    amount: calc.amount,
                    manualLabel: formData.type === '手入力' ? (formData.manualLabel || '') : '',
                    needsApproval: formData.type === 'ツアー'
                };
                setRecords([newRecord, ...records]);
                setIsSuccess(true);
                setTimeout(() => setIsSuccess(false), 2000);
            };

            const invoiceData = useMemo(() => {
                if (!selectedMonth) return { filtered: [], totalAmount: 0, subTotal: 0, tax: 0, totalHours: 0 };
                const filtered = records.filter(r => r.date.startsWith(selectedMonth))
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                const totalAmount = filtered.reduce((sum, r) => sum + (r.amount || 0), 0);
                const subTotal = Math.round(totalAmount / 1.1);
                return {
                    filtered,
                    totalAmount,
                    subTotal,
                    tax: totalAmount - subTotal,
                    totalHours: filtered.reduce((sum, r) => sum + (r.hours ? parseFloat(r.hours) : 0), 0)
                };
            }, [records, selectedMonth]);

            // 対象月に「未承認のツアー」が含まれているか
            const hasUnapprovedRecord = useMemo(() => {
                return invoiceData.filtered.some(r => r.needsApproval && !approvedIds.includes(r.id));
            }, [invoiceData, approvedIds]);

            // 当月・先月のみ入力可能
            const getAllowedMonths = () => {
                const now = new Date();
                const thisMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
                const lastDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                const lastMonth = `${lastDate.getFullYear()}-${String(lastDate.getMonth() + 1).padStart(2, '0')}`;
                return [thisMonth, lastMonth];
            };

            const isDateAllowed = (dateStr) => {
                if (!dateStr) return false;
                const month = dateStr.substring(0, 7);
                return getAllowedMonths().includes(month);
            };

            const inputClass = "w-full p-4 border-2 rounded-2xl font-bold outline-none transition focus:border-[#8fc7a8]";
            const inputStyle = { background: '#f3faf6', borderColor: '#cfe9da' };
            const inputFocusStyle = {};

            const navItems = [
                {id: 'profile', label: '👤 登録'},
                {id: 'input', label: '✏️ 入力'},
                {id: 'history', label: '📋 履歴'},
                {id: 'detail', label: '📝 明細'},
                {id: 'invoice', label: '📄 請求書'}
            ];

            return (
                <div className="min-h-screen pb-24" style={{background: '#f3faf6'}}>
                    {/* Header */}
                    <header className="header-bg p-4 shadow-lg sticky top-0 z-20 no-print" style={{color: '#2d5440'}}>
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-xl font-black tracking-tight">勤怠管理・請求システム</h1>
                                {profile.name && <p className="text-xs opacity-60 mt-0.5">{profile.name} さん</p>}
                            </div>
                            <nav className="hidden md:flex flex-wrap gap-1 p-1 rounded-xl" style={{background: 'rgba(255,255,255,0.1)'}}>
                                {navItems.map((v) => (
                                    <button
                                        key={v.id}
                                        onClick={() => setCurrentView(v.id)}
                                        className={`px-3 py-1.5 rounded-lg text-xs font-bold transition ${currentView === v.id ? 'nav-btn-active' : ''}`}
                                        style={currentView === v.id ? {} : {color: 'rgba(45,84,64,0.55)'}}
                                    >
                                        {v.label}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-4xl mx-auto p-4">

                        {/* ===== プロフィール ===== */}
                        {currentView === 'profile' && (
                            <div className="space-y-6">
                                <div className="rounded-3xl shadow-xl overflow-hidden" style={{background: '#fbfdfc', border: '1px solid #cfe9da'}}>
                                    <div className="px-8 py-6 border-b" style={{background: '#eaf6f0', borderColor: '#cfe9da'}}>
                                        <h2 className="font-black text-sm uppercase tracking-widest" style={{color: '#3d6e54'}}>個人情報・振込先登録</h2>
                                        <p className="text-xs mt-1" style={{color: '#8fc7a8'}}>ここに入力した情報が請求書に自動反映されます</p>
                                    </div>
                                    <div className="p-8 space-y-8">
                                        {/* カフェ専従モード */}
                                        <div className="p-4 rounded-2xl flex items-center justify-between" style={{background: '#fff8ec', border: '1px solid #f5d394'}}>
                                            <div>
                                                <p className="font-black text-sm" style={{color: '#8a6a2a'}}>☕ カフェ専従モード</p>
                                                <p className="text-[10px] mt-0.5" style={{color: '#a68442'}}>カフェのみ勤務する方はONにしてください</p>
                                            </div>
                                            <button
                                                onClick={() => setProfile({...profile, isCafeOnly: !profile.isCafeOnly})}
                                                className="relative w-14 h-8 rounded-full transition flex-shrink-0"
                                                style={{background: profile.isCafeOnly ? '#e0a878' : '#e0d5c5'}}
                                            >
                                                <span className="absolute top-1 w-6 h-6 rounded-full bg-white shadow transition-all" style={{left: profile.isCafeOnly ? '28px' : '4px'}}></span>
                                            </button>
                                        </div>

                                        <div>
                                            <h3 className="text-[10px] font-black uppercase tracking-widest mb-4" style={{color: '#8fc7a8'}}>個人情報</h3>
                                            <div className="space-y-4">
                                                {/* 氏名・屋号 */}
                                                <div>
                                                    <label className="block text-[10px] font-black uppercase mb-2 tracking-widest" style={{color: '#5e8f72'}}>氏名・屋号<span style={{color: '#e05050'}}>＊</span></label>
                                                    <input type="text" style={inputStyle} className={inputClass} value={profile.name} onChange={(e) => setProfile({...profile, name: e.target.value})} placeholder="例：山田 花子" />
                                                </div>
                                                {/* 郵便番号 */}
                                                <div>
                                                    <label className="block text-[10px] font-black uppercase mb-2 tracking-widest" style={{color: '#5e8f72'}}>郵便番号<span style={{color: '#e05050'}}>＊</span></label>
                                                    <div className="flex gap-2 items-center">
                                                        <input
                                                            type="text"
                                                            style={inputStyle}
                                                            className={inputClass + ' flex-1'}
                                                            value={profile.zip}
                                                            onChange={(e) => setProfile({...profile, zip: e.target.value})}
                                                            placeholder="例：123-4567"
                                                            maxLength="8"
                                                        />
                                                        <button
                                                            onClick={async () => {
                                                                const raw = profile.zip.replace(/-/g, '');
                                                                if (raw.length !== 7) return;
                                                                setZipStatus('loading');
                                                                try {
                                                                    const res = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${raw}`);
                                                                    const data = await res.json();
                                                                    if (data.results) {
                                                                        const r = data.results[0];

                                    onChange={(e) => { setPwInput(e.target.value); setPwError(false); }}
                                    placeholder="パスワードを入力"
                                    className="w-full p-3 mb-2 border-2 rounded-xl font-bold text-center outline-none"
                                    style={{background: '#f3faf6', borderColor: pwError ? '#e05050' : '#cfe9da'}}
                                />
                                {pwError && <p className="text-xs text-center mb-3" style={{color: '#e05050'}}>パスワードが違います</p>}
                                <div className="flex gap-3 mt-3">
                                    <button
                                        onClick={() => setPwDialog(null)}
                                        className="flex-1 py-3 rounded-2xl font-black text-sm"
                                        style={{background: '#cfe9da', color: '#5e8f72'}}
                                    >キャンセル</button>
                                    <button
                                        onClick={() => {
                                            if (pwInput === pwDialog.correctPw) {
                                                pwDialog.onOk();
                                                setPwDialog(null);
                                            } else {
                                                setPwError(true);
                                            }
                                        }}
                                        className="flex-1 py-3 rounded-2xl font-black text-sm text-white"
                                        style={{background: 'linear-gradient(135deg, #4ba87f, #7fc8a3)'}}
                                    >確認する</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* モバイルナビ（スマホ最適化） */}
                    <div className="fixed bottom-0 left-0 right-0 backdrop-blur-xl border-t no-print z-40" style={{background: 'rgba(251,253,252,0.97)', borderColor: '#cfe9da'}}>
                        <div className="flex justify-around items-center" style={{paddingBottom: 'env(safe-area-inset-bottom)', paddingTop: '8px', paddingBottom: 'calc(env(safe-area-inset-bottom) + 8px)'}}>
                            {navItems.map(v => (
                                <button key={v.id} onClick={() => setCurrentView(v.id)}
                                    className="flex flex-col items-center gap-1 py-1 px-2"
                                    style={currentView === v.id ? {color: '#8fc7a8'} : {color: '#bfe3cd'}}
                                >
                                    <span style={{fontSize: '20px'}}>{v.label.split(' ')[0]}</span>
                                    <span style={{fontSize: '9px', fontWeight: '800'}}>{v.label.split(' ')[1] || v.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
